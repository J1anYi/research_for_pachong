咨询的项目信息也变多了，很感谢这些愿意继续找我、信任我的客户，保证已经交付的项目稳定运行，该支持的支持，该处理的处理，加油干。#网球预约系统[话题]# ＃全栈开发 #小程序设计[话题]# #个人开发者[话题]# #程序员[话题]# #网站制作[话题]# #小程序[话题]#\\n开发 #小程序商城[话题]# #小程序定制[话题]# ＃下班做副业\",\"nickname\":\"无无\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t921cm758605o0egh808h8qdcs5q9g\",\"liked_count\":\"20\",\"liked_count_num\":20,\"collected_count\":\"6\",\"collected_count_num\":6,\"comment_count\":\"27\",\"share_count\":\"4\",\"tag_list\":[\"网球预约系统\",\"小程序设计\",\"个人开发者\",\"程序员\",\"网站制作\",\"小程序\",\"小程序商城\",\"小程序定制\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/697971ab000000000a02fbdb?xsec_token=ABm9YAe6o7L335MZ4VUVwQ1zAnQ6B3Qvc_rL0GP0ZwZew=&xsec_source=pc_search\",\"time\":1769566636000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"697797aa000000001a02e432\",\"type\":\"normal\",\"title\":\"28岁程序员，接私活第3年，每天下班都要干活\",\"desc\":\"工作第五年，接私活第三年，2023年5月份，开始尝试接私活，到现在已经快3年了。2025年一共接了16个项目，私活一共💰15w+，今年目前为止也已经接到2个项目了。\\n有很多人问我是怎么接私活的，之前我的笔记已经介绍的非常详细了，有兴趣朋友可以去看看。根据我的经验，只能说大家多去尝试各种各样的获客方式，每个渠道的玩法也不一样，每个人擅长的也不一样，当然这其中也需要一定的运气。\\n周末一直在忙一些个人私事，所以基本没怎么写代码，周末聊了一个客户，做一个小的官方查询网站，客户比较急，想一周左右要，我评估了下，加班熬夜干，应该可以的，今天客户也是确定合作了，2026年新项目➕1️⃣。\\n晚上了做了一个老项目的优化需求，然后就是开发新项目了，月底要交付，得加把劲了，这几天公司项目也比较忙，得加班加点的干活了，真的时间都是挤出来了[笑哭R]。\\n#软件开发[话题]# #程序员[话题]# #软件定制开发[话题]# #没想到你是这样的程序员[话题]# #订单管理系统[话题]# #小程序开发[话题]# #副业[话题]# #小程序定制开发[话题]# #程序员的出路[话题]# #个人开发者[话题]#\",\"nickname\":\"深漂程序员犬夜叉\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/6460f653f9ef96cf85921fb1.jpg\",\"liked_count\":\"92\",\"liked_count_num\":92,\"collected_count\":\"32\",\"collected_count_num\":32,\"comment_count\":\"18\",\"share_count\":\"14\",\"tag_list\":[\"软件开发\",\"程序员\",\"软件定制开发\",\"没想到你是这样的程序员\",\"订单管理系统\",\"小程序开发\",\"副业\",\"小程序定制开发\",\"程序员的出路\",\"个人开发者\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/697797aa000000001a02e432?xsec_token=ABQoWnS694TuFcFYQcwTKuYytkM4-OIGAhpslzzi1aU