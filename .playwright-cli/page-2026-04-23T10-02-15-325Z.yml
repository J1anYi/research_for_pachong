_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"69ae375c000000000e03f921\",\"type\":\"normal\",\"title\":\"程序员副业很多，但最后其实只有3条路\",\"desc\":\"最近在研究程序员副业的时候，\\n发现一个挺有意思的现象。\\n看起来副业很多，\\n但如果把各种方式都拆开看，\\n最后其实只剩 3条路。\\n很多人副业做不起来，\\n不是能力问题，\\n而是一开始 选错了方向。\\n\\t\\n第一条路：接外包\\n这是大部分程序员最先想到的。\\n优点很明显：\\n变现快\\n用的还是自己的技术能力\\n但问题也很现实：\\n不稳定\\n很依赖平台\\n很难规模化\\n很多人做了一段时间会发现：\\n其实只是换了一种方式加班。\\n\\t\\n第二条路：做产品\\n比如：\\n小工具\\nSaaS\\n插件\\n这条路理论上 天花板最高。\\n但难点在于：\\n需要产品思维\\n需要流量\\n成功率其实不高\\n很多程序员技术很好，\\n但产品做出来 没人用。\\n\\t\\n第三条路：做内容\\n这两年越来越多程序员开始尝试这条路。\\n比如：\\n分享技术经验\\n分享职场成长\\n分享副业探索\\n一旦内容有流量：\\n可以接广告\\n可以卖产品\\n可以做知识付费\\n而且 是有复利的。\\n\\t\\n我自己现在也在尝试第三条路。\\n把思考和过程记录下来。\\n看看普通程序员\\n到底能不能走通这条路。\\n如果你也是程序员，\\n你会选哪条路？#程序员[话题]##程序员副业[话题]##副业探索[话题]#\",\"nickname\":\"个人IP成长录 | 从0到变现\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/2b4cefbb01e0a0824f5c173dde7f98b2.jpg\",\"liked_count\":\"15\",\"liked_count_num\":15,\"collected_count\":\"18\",\"collected_count_num\":18,\"comment_count\":\"9\",\"share_count\":\"4\",\"tag_list\":[\"程序员\",\"程序员副业\",\"副业探索\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/69ae375c000000000e03f921?xsec_token=ABd8BFjH5gY3fEulqDDcPlMMjSa6NzDyFnzEBvnHkJoVk=&xsec_source=pc_search\",\"time\":1773025116000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"69a2b5910000000028009fce\",\"type\":\"normal\",\"title\":\"加入我们 | 面向·会用AI写项目的程序员\",\"desc\":\"如果你已经在 Vibe Coding，\\n那这条内容，就是给你的！✨\\n\\t\\n我们在做什么？\\n用真实需求 + 完整项目，评估和训练 Vibe Coding 的工程能力。\\n\\t\\n具体形式是：\\n- 提供明确的需求 Prompt\\n- 要求从 0 到 1 交付完整项目代码\\n- 项目会被用于模型训练和能力评估\\n所以我们需要的不是“写代码的人”\\n而是已经能用 AI 稳定交付项目的人。\\n\\t\\n合作方式 & 投入预期\\n📍远程，不限制地点。\\n📁任务 / 项目制，主要交付「代码 + 简要文档」\\n🎯前期考核：从0-1构建仿真项目（500-800激励）\\n⏱️建议每周投入约 20 小时\\n\\t\\n如果你平时已经在用 AI 起项目、改项目、重构项目， 那你大概率是符合的。\\n\\t\\n感兴趣的小伙伴请斯我~\\n期待在项目中与你协作！🙌\\n\\t\\n#程序员的出路[话题]# #aicoding[话题]# #程序员[话题]# #程序员兼职[话题]# #软件工程[话题]# #大模型[话题]# #coding[话题]# #算法策略[话题]