6546332000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"694b5b9b000000001d038207\",\"type\":\"normal\",\"title\":\"果然在咸鱼打开思路=打开销路\",\"desc\":\"没想到接单定制圣诞树代码还能赚到钱哈哈哈\\n祝福这位大兄弟🐶\\n#圣诞[话题]##程序员[话题]# #圣诞节[话题]# #表白[话题]# #代码[话题]#\",\"nickname\":\"好奇-怪🌁\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo318o0li5tjk005n15rdshlslguvd6c6g\",\"liked_count\":\"192\",\"liked_count_num\":192,\"collected_count\":\"22\",\"collected_count_num\":22,\"comment_count\":\"12\",\"share_count\":\"9\",\"tag_list\":[\"圣诞\",\"程序员\",\"圣诞节\",\"表白\",\"代码\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/694b5b9b000000001d038207?xsec_token=ABmyRduU5HK560Qre6F8GYYs0Udux-oBJpPLHXBBzb-Gg=&xsec_source=pc_search\",\"time\":1766546332000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"69327f37000000001f00cef4\",\"type\":\"normal\",\"title\":\"worldquant - 收入一天天在增加\",\"desc\":\"现在基本上保持每天交一个质量高的RA，一个Super Alpha。\\n\\t\\n昨天交上去的这个regular alpha拿了3刀，算上1.83刀的混子Super Alpha，总共有4.91刀，折合成RMB 35元钱[笑哭了R]。\\n\\t\\n虽然少是少了点，但确实是向着好的方向在发展。而且隐隐感觉，payment的基础在提高，希望后面的VF能有突破性的上涨📈。\\n\\t\\n这两天，都没好好逛论坛，一直在搞代码。\\n\\t\\n想写一个，判断alpha提交后对组合好坏影响的脚本，通过批量输入alpha id，返回出每个alpha的评分，评分最高的可以优先提交。不过这逻辑很难想明白，而且每个人的标准都不一样，不知道怎么泛化，再想想吧[失望R]。\\n\\t\\n#worldquant顾问[话题]# #worldquant[话题]# #worldquant兼职[话题]# #被动收入[话题]# #兼职副业[话题]#\",\"nickname\":\"小房总~\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo317m1ihemk4605pbqeb386bap1dsnpdg\",\"liked_count\":\"16\",\"liked_count_num\":16,\"collected_count\":\"3\",\"collected_count_num\":3,\"comment_count\":\"12\",\"share_count\":\"1\",\"tag_list\":[\"worldquant顾问\",\"worldquant\",\"worldquant兼职\",\"被动收入\",\"兼职副业\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/69327f37000000001f00cef4?xsec_token=ABQ75l5Lk5kyk40-DpWlcjm3fqkuqZKr6Ne0Le4U0f5Sc=&xsec_source=pc_search\",\"time\":1764917047000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"691f365b000000001f009005\",\"type\":\"normal\",\"title\":\"28岁程序员，下班接私活，项目快收尾了\",\"desc\":\"月初接的积分兑换小程序，这周终于进入收尾阶段，已经进入小程序页面制作了，客户那边域名和小程序都已经备案好了，就等这个小程序做完就可以上线了。所以晚上加加班，争取周末完工。\\n前几天也聊了几个订单系统，一个是做生物检测行业的，一个运输行业的，还有一个做设计行业的。发现这个公司都有一些共性，都会有一批灵活就业的员工，按单算工资，这样其实挺好的节省了用人成本，其实我们这个it行业也是一样，会有很多类似中间人，来赚这个差价。\\n周内聊的几个项目，整理完需求，报完价后，都没有确认合作。\\n#程序员[话题]# #软件开发[话题]# #没想到你是这样的程序员[话题]# #软件定制开发[话题]# #小程序开发[话题]# #订单管理系统[话题]# #小程序定制开发[话题]# #小程序制作[话题]# #副业[话题]# #程序员的出路[话题]#\",\"nickname\":\"深漂程序员犬夜叉\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/6460f653f9ef96cf85921fb1.jpg\",\"liked_count\":\"38\",\"liked_count_num\":38,\"collected_count\":\"10\",\"collected_count_num\":10,\"comment_count\":\"\",\"share_count\":\"\",\"tag_list\":[\"程序员\",\"软件开发\",\"没想到你是这样的程序员\",\"软件定制开发\",\"小程序开发\",\"订单管理系统\",\"小程序定制开发\",\"小程序制作\",\"副业\",\"程序员的出路\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/691f365b000000001f009005?xsec_token=ABkczfoRmVbKYD16N82OeLpZ7CDpU7T6_xn_DJLwFd4y4=&xsec_source=pc_search\",\"time\":1763653211000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"6918620b000000000401010e\",\"type\":\"normal\",\"title\":\"接了个20W的项目，聊到报价时对方沉默了…\",\"desc\":\"真的会谢……又双叒叕被甲方沉默对待了！！\\n\\t\\n最近接到了一个海外电商平台开发的项目。对方一开始热情沟通，需求聊得挺细，对方想做个“海外版拼多多”需求聊得挺顺畅 产品文档都发来了\\n\\t\\n谈到报价时我根据：\\n🔹前后端开发+测试\\n🔹5-7个月周期\\n🔹包含原型设计\\n报了20W左右的预算\\n\\t\\n结果……已读不回了！！💢\\n\\t\\n现在终于理解为什么前辈说：\\n“接私单比写代码难100倍”\\n明明前期沟通很专业\\n一谈钱就秒变“聊天机器人故障”\\n\\t\\n最扎心的是对方还说：\\n“我们暂时没有技术团队”\\n“可以考虑让你全权负责”\\n结果在真金白银面前……🦗\\n\\t\\n有没有同样遭遇的技术人？\\n是不是报价前该先发个《程序员生存指南》？\\n还是我该在报价单里塞点猫猫表情包？🐱\\n\\t\\n#程序员[话题]# #程序员接单[话题]# #程序员副业[话题]# #独立开发[话题]# #小程序开发[话题]# #前端[话题]# #程序员出海[话题]# #后端[话题]# #软件设计与开发[话题]# #后端开发[话题]#\",\"nickname\":\"核动力编程\",\"avatar\":\"https://sns-avatar-qc.xhscdn.c