漂程序员犬夜叉\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/6460f653f9ef96cf85921fb1.jpg\",\"liked_count\":\"67\",\"liked_count_num\":67,\"collected_count\":\"25\",\"collected_count_num\":25,\"comment_count\":\"31\",\"share_count\":\"7\",\"tag_list\":[\"程序员\",\"软件定制开发\",\"订单管理系统\",\"小程序开发\",\"软件开发\",\"副业\",\"小程序制作\",\"没想到你是这样的程序员\",\"AI工具\",\"程序员的出路\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/69dc3933000000002003aff9?xsec_token=ABk-WHai3rsC_p7GVfJ3xMoWfjNJQz5omRW_WiKPtrq8c=&xsec_source=pc_search\",\"time\":1776040243000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"69dc3933000000002003aff9\",\"type\":\"normal\",\"title\":\"程序员接私活，周末不休息，又肝到半夜了\",\"desc\":\"周末太忙了[暗中观察R]，目前手上一共四个项目，三个项目已经交付给客户体验使用了，还有一个项目进度也有三分之一了，准备月底交付客户体验使用。\\n周末主要就是一方面整理并完成周内一些老客户提的优化需求，比如之前的板车系统，有一些不严重的bug要修复，设计师订单系统，客户需要做一些输入的限制，避免脏数据，企业资产小程序，客户需要加一个批量导入，以及对用户做一些资产分类查看的权限等。\\n周日也聊了一个新客户[哇R]，其实周内就已经聊了，不过因为项目太大，所以周内就简单了解了一下业务流程，然后借助客户提供的资料去理解需求，周日又和客户对着资料详细的对接了一下整个流程，聊了将近3个小时，客户主要是想做一款软件，去管理工厂的产品，销售，生产，采购，库存，以及财务这块流程，之前也对接过公司的saas系统，不是很满意，因为客户公司流程以及人力，不能适用saas系统，所以打算定制一个符合自己公司现状的软件，聊的也挺好的，需求已经整理给客户，等客户确认中[微笑R]。\\n🌟这两天其实也学习了一下openclaw的，其实openclaw刚出来的时候就用过，但是觉得它写代码又如cursor那个直观，搜索又不如类似gpt的，提供的相关skills，基本都是一些国外或者我们不常用的软件，所以当时就觉得它不咋样，就是噱头。这两天稍微系统的看了下，觉得openclaw优势其实不是在于那些，而是他有自己的记忆系统，可以养自己的AI，让这个龙虾专注于你需要的领域，更好帮你输出的问答给AI，然后实现更好答案。它还有很多优势，我觉得学会使用这类工具，也是进入AI时代不可缺少技能[斜眼R]。\\n#程序员[话题]# #软件定制开发[话题]# #订单管理系统[话题]# #小程序开发[话题]# #软件开发[话题]# #副业[话题]# #小程序制作[话题]# #没想到你是这样的程序员[话题]# #AI工具[话题]# #程序员的出路[话题]#\",\"nickname\":\"深漂程序员犬夜叉\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/6460f653f9ef96cf85921fb1.jpg\",\"liked_count\":\"67\",\"liked_count_num\":67,\"collected_count\":\"25\",\"collected_count_num\":25,\"comment_count\":\"31\",\"share_count\":\"7\",\"tag_list\":[\"程序员\",\"软件定制开发\",\"订单管理系统\",\"小程序开发\",\"软件开发\",\"副业\",\"小程序制作\",\"没想到你是这样的程序员\",\"AI工具\",\"程序员的出路\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/69dc3933000000002003aff9?xsec_token=ABk-WHai3rsC_p7GVfJ3xMoWfjNJQz5omRW_WiKPtrq8c=&xsec_source=pc_search\",\"time\":1776040243000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"69db0a0c0000000021039d54\",\"type\":\"normal\",\"title\":\"程序员接私活，4天搞定别人报价5w的项目\",\"desc\":\"最近交付了一个门店薪资管理系统，从需求确认到上线一共花了4天，客户之前找外包公司问过，报价5万，工期一个月。\\n\\t\\n这个项目是帮一个做门窗的老板做的，他们有好几家门店，每个门店岗位不一样，提成规则也不一样，店员、店长、售后、安装工、业务员，每个角色工资算法都不同。之前老板每个月月底都要手动对数据算工资，费时费力还容易出错。\\n\\t\\n前两天主要是搭系统骨架，需求丢进Claude Code让它先出数据库表结构，店员表、订单表、卸车记录、安装记录这些，基本一次性就出来了，自己再过一遍调细节。接口层也是一样，把业务规则描述清楚，CRUD和校验逻辑直接生成，登录权限、员工管理、客户录入这些模块两天全部跑通。前端用Cursor写的，把后端接口文档喂进去，页面和交互生成得很快，店长工作台、工资明细页、安装记录录入这些，基本不用怎么手动调。\\n\\t\\n这套系统工资算法还挺复杂的，店员是底薪3000加零售额提成，售后是底薪5000加卸车次数计件，安装工纯计件按门型和公里数算，店长底薪1万加报销加年度奖金，业务员还分老业务员和新业务员不同规则。这部分我是自己一行一行过的，涉及钱的计算不敢偷懒，Claude给了好几种核算方案，得逐个判断哪个靠谱。\\n\\t\\n后两天跑了一遍Playwright自动化测试，登录、录单、卸车、安装、算工资、批量审批整个流程走下来，揪出来好几个边界bug，比如当月没有卸车记录的时候售后工资直接显示NaN，这种靠手动测根本覆盖不到。最后让Claude Code帮我同步生成了三份文档，计算规则说明、操作手册、测试流程，老板拿到直接就能看懂，不用我再解释。\\n\\t\\n客户拿到系统之后挺满意的，店长每天打开工作台数据一目了然，月底算工资3步搞定，安装工售后自己在手机上录数据，系统自动算收入。\\n\\t\\n手上还有一个会员积分系统在排队，一个老客户转介绍的项目明天详聊。说实话老客户转介绍是接私活最好的获客方式，说明之前的项目客户认可，比自己找客户靠谱多了。累是真的累，但趁年轻多折腾吧。\\n\\t\\n#程序员[话题]# #软件开发[话题]# #副业[话题]# #接私活[话题]# #Claude[话题]# #Cursor[话题]# #程序员的出路[话题]# #个人开发者[话题]# #全栈开发[话题]# #软件定制开发[话题]#\",\"nickname\":\"核动力编程\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31fu7fa5mgg6g5odrp6kocgpb7qqmf98\",\"liked_count\":\"90\",\"liked_count_num\":90,\"collected_count\":\"70\",\"collected_count_num\":70,\"comment_count\":\"71\",\"share_count\":\"32\",\"tag_list\":[\"程序员\",\"软件开发\",\"副业\",\"接私活\",\"Claude\",\"Cursor\",\"程序员的出路\",\"个人开发者\",\"全栈开发\",\"软件定制开发\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/69db0a0c0000000021039d54?xsec_token=ABJnQUKZmfoCVOCF8QxegSdcKFzBQ0GGZLEDbccsqbZuo=&xsec_source=pc_search\",\"time\":1775998681000,\"imag