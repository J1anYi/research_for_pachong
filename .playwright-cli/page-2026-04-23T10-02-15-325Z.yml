",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31dq3h3vp0e005pf9fma191v7jtpfuso\",\"liked_count\":\"1140\",\"liked_count_num\":1140,\"collected_count\":\"3061\",\"collected_count_num\":3061,\"comment_count\":\"8\",\"share_count\":\"384\",\"tag_list\":[\"程序员\",\"编程\",\"搞钱\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/690072b9000000000301a409?xsec_token=ABfeIQL1orytOJLPdEveXFbJ6nZ8Gu8XTvdY28o4Btm14=&xsec_source=pc_search\",\"time\":1761637049000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"http://sns-video-hw.xhscdn.com/stream/1/110/259/01e900728022fd49010370039a29c0558d_259.mp4?sign=18cae7a2fe5a62ad4d8befe3f0372abc&t=69e5c949\"},{\"note_id\":\"68f5fbd8000000000301b430\",\"type\":\"normal\",\"title\":\"每天避坑一个副业：AI开发App（18/365）\",\"desc\":\"自从AI火了以后，市面上就冒出了各种 “用AI搞副业”“一人公司” 的说法\\n\\t\\n把不少人忽悠得一愣一愣的 🤯\\n\\t\\n特别是去年年底 “小猫补光灯” 爆火之后，\\n很多有技术背景的同学开始蠢蠢欲动，觉得现在就是 AI开发App的最 好时机。\\n\\t\\n那今天就来聊聊——\\n\\t\\n🧠 用AI搞App，到底靠不靠谱？\\n\\t\\n⚠️ 一、真正的难点，从来不是写代码\\n\\t\\n你以为有了 AI大模型，写代码就不费劲？\\n\\t\\n确实，大模型让编程简单了不少，\\n\\t\\n但整套流程里，写代码只占不到30%，真正的是后面这 70% 的“软成 本”：\\n\\t\\n📄 ICP备案：现在国内所有能上架的App都要求备案；\\n\\t\\n🏢 公司注册 + 财务处理：备案必须用公司，还得记账报税；\\n\\t\\n📲 行业许可证：涉及支付、社交、教育、医x疗等，通通都要相关牌照；\\n\\t\\n🔒 安x全评估报告：只要涉及用户数据和交流，基本都得测评；\\n\\t\\n🔌 这些都搞完了，App才只是“能上线”。\\n\\t\\n所以你看到的大多数独立开发项目，其实都是：\\n\\t\\n👉 不联网的\\n👉 不收数据的\\n👉 简单工具类App（比如记账、日程、闹钟）\\n\\t\\n因为只有这样，才能绕开复杂的备案和合 规要求。\\n\\t\\n🤷‍♂️ 二、有没有App不重要，有没有人用才重要\\n\\t\\n现在AI能帮你写App没问题，\\n\\t\\n但关键从来不是“你能不能做出来”，而是：\\n\\t\\n🎯 你有没有找到一个值得做的需求\\n\\t\\n👥 有没有一群愿意用、愿意付费的真实用户\\n\\t\\n市面上App变现方式就两种：\\n\\t\\n💰 IAA：插广告；\\n💳 IAP：用户氪金。\\n\\t\\n这两种都绕不开一个大前提：得有用户量。\\n\\t\\n但很多人一通猛写、功能拉满，结果上线之后根本没人用、没人付费，\\n\\t\\n投广告也烧不起，最后只能放那儿吃灰 🪨\\n\\t\\n📌 结论是：\\n\\t\\n有没有App不重要，关键是有没有真实客户，能不能真正解 决问题。\\n\\t\\n🕳️ 三、你能写，别人也能抄\\n\\t\\n以前做App还得懂点技术、拉个团队，现在AI出来后，\\n你辛苦写出来的功能，别人可能用AI一下午就复制完了 👻\\n\\t\\n而且大团队手里有预算，能投流、能做推广、能铺渠道，\\n你一个人既做开发，又拉用户，又想着赚 钱，根本卷不过去。\\n\\t\\n所以别只盯着“能不能做出来”，真正决定能不能跑出来的，是：\\n\\t\\n✅ 谁能更高 效 率、更低成 本地获取用户？\\n\\t\\n✅ 谁能真正把商业模式跑通？\\n\\t\\n✅ 最后一句建议\\n\\t\\n如果你只是想练手做个App，那可以试试。\\n\\t\\n但如果你指望靠AI搞一份稳定收入，建议你冷静\\n\\t\\n#避坑[话题]# #副业[话题]# #副业避坑[话题]# #ai[话题]# #独立开发[话题]# #个人开发者[话题]# #副业探索者[话题]#\",\"nickname\":\"邱三多\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31mqfhnb5mm605pr0v64m3m2ufean6d8\",\"liked_count\":\"442\",\"liked_count_num\":442,\"collected_count\":\"462\",\"collected_count_num\":462,\"comment_count\":\"31\",\"share_count\":\"99\",\"tag_list\":[\"避坑\",\"副业\",\"副业避坑\",\"ai\",\"独立开发\",\"个人开发者\",\"副业探索者\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/68f5fbd8000000000301b430?xsec_token=AB-N1FaxZeYSAIbPQn160WZ88ZX9uboWhHvi9Tb1Awvmw=&xsec_source=pc_search\",\"time\":1761013620000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"68f5fbd8000000000301b430\",\"type\":\"normal\",\"title\":\"每天避坑一个副业：AI开发App（18/365）\",\"desc\":\"自从AI火了以后，市面上就冒出了各种 “用AI搞副业”“一人公司” 的说法\\n\\t\\n把不少人忽悠得一愣一愣的 🤯\\n\\t\\n特别是去年年底 “小猫补光灯” 爆火之后，\\n很多有技术背景的同学开始蠢蠢欲动，觉得现在就是 AI开发App的最 好时机。\\n\\t\\n那今天就来聊聊——\\n\\t\\n🧠 用AI搞App，到底靠不靠谱？\\n\\t\\n⚠️ 一、真正的难点，从来不是写代码\\n\\t\\n你以为有了 AI大模型，写代码就不费劲？\\n\\t\\n确实，大模型让编程简单了不少，\\n\\t\\n但整套流程里，写代码只占不到30%，真正的是后面这 70% 的“软成 本”：\\n\\t\\n📄 ICP备案：现在国内所有能上架的App都要求备案；\\n\\t\\n🏢 公司注册 + 财务处理：备案必须用公司，还得记账报税；\\n\\t\\n📲 行业许可证：涉及支付、社交、教育、医x疗等，通通都要相关牌照；\\n\\t\\n🔒 安x全评估报告：只要涉及用户数据和交流，基本都得测评；\\n\\t\\n🔌 这些都搞完了，App才只是“能上线”。\\n\\t\\n所以你看到的大多数独立开发项目，其实都是：\\n\\t\\n👉 不联网的\\n👉 不收数据的\\n👉 简单工具类App（比如记账、日程、闹钟）\\n\\t\\n因为只有这样，才能绕开复杂的备案和合 规要求。\\n\\t\\n🤷‍♂️ 二、有没有App不重要，有没有人用才重要\\n\\t\\n现在AI能帮你写App没问题，\\n\\t\\n但关键从来不是“你能不能做出来”，而是：\\n\\t\\n🎯 你有没有找到一个值得做的需求\\n\\t\\n👥 有没有一群愿意用、愿意付费的真实用户\\n\\t\\n市面上App变现方式就两种：\\n\\t\\n💰 IAA：插广告；\\n💳 IAP：用户氪金。\\n\\t\\n这两种都绕不开一个大前提：得有用户量。\\n\\t\\n但很多人一通猛写、功能拉满，结果上线之后根本没人用、没人付费，\\n\\t\\n投广告也烧不起，最后只能放那儿吃灰 🪨\\n\\t\\n📌 结论是：\\n\\t\\n有没有App不重要，关键是有没有真实客户，能不能真正解 决问题。\\n\\t\\n🕳️ 三、你能写，别人也能抄\\n\\t\\n以前做App还得懂点技术、拉个团队，现在AI出来后