话题]# #财务人[话题]# #会计[话题]# #编程[话题]# #财务软件[话题]# #财务会计[话题]# #财务分析[话题]# #程序员职业生活大赏[话题]# #程序员的出路[话题]#\",\"nickname\":\"爱编程的财会\",\"avatar\":\"https://sns-avatar-qc.xhscdn.com/avatar/645b7e90e29f7d0acadad8aa.jpg\",\"liked_count\":\"717\",\"liked_count_num\":717,\"collected_count\":\"686\",\"collected_count_num\":686,\"comment_count\":\"211\",\"share_count\":\"88\",\"tag_list\":[\"财务bp\",\"会计转行\",\"财务人\",\"会计\",\"编程\",\"财务软件\",\"财务会计\",\"财务分析\",\"程序员职业生活大赏\",\"程序员的出路\"],\"source_keyword\":\"编程副业\",\"note_url\":\"https://www.xiaohongshu.com/explore/6911ea390000000007033262?xsec_token=ABC2LdzHEAr0GMLx-QttBlDbHoPIBq9EmTJ6mfg646zJg=&xsec_source=pc_search\",\"time\":1762781753000,\"image_count\":0,\"local_image_url\":null,\"remote_image_url\":null,\"first_image_url\":null,\"video_url\":\"\"},{\"note_id\":\"690e5bcf0000000003038ec6\",\"type\":\"normal\",\"title\":\"学生新副业思路之应用开发怎么赚钱\",\"desc\":\"时代变了，之前主业的价值在于稳定性和增长性，但随着竞争加大，且不说进入岗位后能否稳定，连被录取都是个问题。但社会永远都需要有能力的人来提供某种服务，如果你刚好可以提供相应的价值，副业对你就是一个很好的选择。\\n\\t\\n所以我对副业的定义就是提供服务，只不过服务的类型有区别。送外卖是服务，主要消耗体力；做开发也是服务，主要消耗脑力。看你擅长什么，也看你喜欢什么。我不觉得体力劳动就低人一等，只是我更擅长后者，所以接下来的思考主要围绕脑力劳动展开。\\n\\t\\n1️⃣ 利用你的专业能力。人总有自己相对擅长的方向，可能是你的专业，也可能是你的爱好。比如以我所在的计算机专业为例，帮人写代码做开发就是一项长期存在且薪酬不低的业务，而且大厂对此往往也有扶持政策，比如华为就有「鸿蒙应用开发者激励计划2025」，只要开发上架鸿蒙应用就可以获得现金激励，像小福家，汇绳结，动物餐厅，欢乐牌等项目都拿到过。这个小福家我还挺喜欢，能跨安卓、苹果、鸿蒙设备互发 Live 图，可以多人共享在一起，像情侣或者一家人用起来就很方便。感觉这些APP也不是说功能多复杂，都上架成功了，他们跟着官网上各种资料和指导，借助AI辅助编程，简简单单开发一个应用就可以获得5k基础金，再算上活跃激励，多的话能拿1w，这还只是一个app，可以说很良心了。而且这个过程你的鸿蒙开发能力也会提高，现在HarmonyOS 5 终端设备数突破2300万台，可以想像未来肯定还有很大空间，没准会开放更多AI接口，没准会提供更多元变现模式，而你现在入场，没准也有更大机遇。\\n\\t\\n2️⃣ 利用你的头脑。如果你并不想在某个细分专业领域精进，做资源合理配置其实也挺好。比如上面提到的开发者激励，你不会写代码，但你组了一个很强的团队，有人负责app定位，有人负责app开发，你负责统筹协调，最后打包完成赚了1w你分走2k，也是很好的事。其实很多中介都在做类似的事，不要觉得资源配置没有意义，减少信息不对称本身就是价值的体现。\\n\\t\\n以上纯属学生视角的个人思考，但总之，我觉得被动等待毕业被动等待工作被动等待晋升的时代过去了，需要为自己未来的出路做好打算。毕竟只有你，才能给自己兜底，也才会给自己兜底。\\n\\t\\n#鸿蒙发布亿元级应用开发激励计[话题]#划 #鸿蒙应用开发者激励计划[话题]# #鸿蒙[话题]# #鸿蒙开发者[话题]# #huawei[话题]# #程序员[话题]# #华为激励计划[话题]# #鸿蒙开发[话题]# #鸿人有话说[话题]# #了不起的鸿蒙开发者[话题]#\",\"nickname\":\"圈宁CeoxNi